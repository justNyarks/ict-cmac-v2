name: Dependency Security Audit

on:
  pull_request:
    paths:
      - package.json
      - package-lock.json
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
